<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="680" height="520">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#06090f"/>
    <stop offset="100%" stop-color="#010208"/>
  </radialGradient>

  <linearGradient id="sigL" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#00ddff" stop-opacity="0.0"/>
    <stop offset="30%"  stop-color="#00ddff" stop-opacity="0.9"/>
    <stop offset="75%"  stop-color="#0077cc" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#003388" stop-opacity="0.0"/>
  </linearGradient>

  <linearGradient id="sigR" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#6600cc" stop-opacity="0.0"/>
    <stop offset="25%"  stop-color="#8822ee" stop-opacity="0.6"/>
    <stop offset="70%"  stop-color="#cc66ff" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#cc66ff" stop-opacity="0.0"/>
  </linearGradient>

  <linearGradient id="tealG" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="#88ffee"/>
    <stop offset="40%"  stop-color="#00ddcc"/>
    <stop offset="100%" stop-color="#008877"/>
  </linearGradient>

  <radialGradient id="glowL" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#004488" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowR" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#220044" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
  </radialGradient>

  <filter id="tealGlow" x="-20%" y="-60%" width="140%" height="220%">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="tealGlowSoft" x="-20%" y="-60%" width="140%" height="220%">
    <feGaussianBlur stdDeviation="18" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <filter id="tagGlow" x="-20%" y="-80%" width="140%" height="360%">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <filter id="blur3"><feGaussianBlur stdDeviation="3"/></filter>
  <filter id="blur6"><feGaussianBlur stdDeviation="6"/></filter>
  <filter id="blur12"><feGaussianBlur stdDeviation="12"/></filter>
</defs>

<!-- Background -->
<rect width="680" height="520" fill="url(#bg)"/>

<!-- Stars -->
<g opacity="0.45">
  <circle cx="88"  cy="72"  r="1.2" fill="#ffffff"/>
  <circle cx="195" cy="48"  r="0.8" fill="#aaddff"/>
  <circle cx="318" cy="42"  r="1.0" fill="#ffffff"/>
  <circle cx="455" cy="52"  r="0.8" fill="#ffeecc"/>
  <circle cx="572" cy="68"  r="1.1" fill="#ffffff"/>
  <circle cx="625" cy="165" r="0.8" fill="#ddbbff"/>
  <circle cx="635" cy="295" r="0.9" fill="#ffffff"/>
  <circle cx="598" cy="378" r="0.8" fill="#aaddff"/>
  <circle cx="72"  cy="375" r="0.9" fill="#ffffff"/>
  <circle cx="48"  cy="248" r="0.8" fill="#aaddff"/>
  <circle cx="62"  cy="142" r="1.0" fill="#ffffff"/>
  <circle cx="155" cy="398" r="0.8" fill="#ddbbff"/>
  <circle cx="512" cy="395" r="0.8" fill="#ffddaa"/>
  <circle cx="248" cy="405" r="0.9" fill="#ffffff"/>
  <circle cx="432" cy="408" r="0.8" fill="#ffffff"/>
</g>

<!-- Ambient glows -->
<ellipse cx="248" cy="228" rx="95" ry="45" fill="url(#glowL)" filter="url(#blur12)"/>
<ellipse cx="432" cy="228" rx="95" ry="45" fill="url(#glowR)" filter="url(#blur12)"/>

<!-- Accretion disk -->
<ellipse cx="340" cy="228" rx="188" ry="32" fill="none" stroke="#441100" stroke-width="22" opacity="0.45" filter="url(#blur12)"/>
<ellipse cx="340" cy="228" rx="165" ry="26" fill="none" stroke="#882200" stroke-width="12" opacity="0.5"  filter="url(#blur6)"/>
<ellipse cx="340" cy="228" rx="142" ry="20" fill="none" stroke="#cc5500" stroke-width="7"  opacity="0.6"  filter="url(#blur3)"/>
<ellipse cx="340" cy="228" rx="122" ry="15" fill="none" stroke="#ee7700" stroke-width="4"  opacity="0.7"/>
<ellipse cx="340" cy="228" rx="106" ry="11" fill="none" stroke="#ff9922" stroke-width="2"  opacity="0.85"/>
<ellipse cx="340" cy="228" rx="106" ry="11" fill="none" stroke="#ffcc55" stroke-width="0.8" opacity="0.9"/>

<!-- LEFT signal wave -->
<path d="M108,228 C128,198 152,258 172,228 C184,210 196,246 206,228 C212,218 218,238 223,228 C227,221 231,235 234,228 C236,224 238,232 240,228"
  fill="none" stroke="url(#sigL)" stroke-width="2.2" stroke-linecap="round"/>
<path d="M108,228 C128,198 152,258 172,228 C184,210 196,246 206,228 C212,218 218,238 223,228 C227,221 231,235 234,228 C236,224 238,232 240,228"
  fill="none" stroke="#00ccff" stroke-width="6" stroke-linecap="round" opacity="0.1" filter="url(#blur3)"/>

<!-- LEFT compressed wavefronts -->
<g stroke-linecap="round" fill="none">
  <line x1="248" y1="210" x2="248" y2="246" stroke="#0099ee" stroke-width="1.5" opacity="0.6"/>
  <line x1="255" y1="207" x2="255" y2="249" stroke="#00aaff" stroke-width="1.6" opacity="0.7"/>
  <line x1="263" y1="204" x2="263" y2="252" stroke="#00bbff" stroke-width="1.7" opacity="0.75"/>
  <line x1="271" y1="202" x2="271" y2="254" stroke="#00ccff" stroke-width="1.8" opacity="0.8"/>
  <line x1="279" y1="201" x2="279" y2="255" stroke="#00ddff" stroke-width="1.8" opacity="0.85"/>
  <line x1="286" y1="200" x2="286" y2="256" stroke="#22ddff" stroke-width="1.9" opacity="0.88"/>
  <line x1="292" y1="200" x2="292" y2="256" stroke="#44eeff" stroke-width="1.9" opacity="0.9"/>
  <line x1="297" y1="201" x2="297" y2="255" stroke="#66eeff" stroke-width="1.9" opacity="0.88"/>
  <line x1="301" y1="202" x2="301" y2="254" stroke="#88ffff" stroke-width="1.8" opacity="0.8"/>
  <line x1="305" y1="204" x2="305" y2="252" stroke="#aaffff" stroke-width="1.6" opacity="0.7"/>
  <line x1="308" y1="207" x2="308" y2="249" stroke="#ccffff" stroke-width="1.4" opacity="0.55"/>
  <line x1="311" y1="211" x2="311" y2="245" stroke="#eeffff" stroke-width="1.1" opacity="0.38"/>
  <line x1="313" y1="217" x2="313" y2="239" stroke="#ffffff" stroke-width="0.8" opacity="0.22"/>
</g>

<!-- RIGHT stretched wavefronts -->
<g stroke-linecap="round" fill="none">
  <line x1="367" y1="217" x2="367" y2="239" stroke="#ffffff"  stroke-width="0.8" opacity="0.22"/>
  <line x1="369" y1="211" x2="369" y2="245" stroke="#ee88ff"  stroke-width="1.1" opacity="0.38"/>
  <line x1="372" y1="207" x2="372" y2="249" stroke="#dd66ff"  stroke-width="1.4" opacity="0.55"/>
  <line x1="376" y1="204" x2="376" y2="252" stroke="#cc44ff"  stroke-width="1.6" opacity="0.7"/>
  <line x1="381" y1="202" x2="381" y2="254" stroke="#bb33ee"  stroke-width="1.8" opacity="0.8"/>
  <line x1="387" y1="201" x2="387" y2="255" stroke="#aa22dd"  stroke-width="1.8" opacity="0.85"/>
  <line x1="395" y1="200" x2="395" y2="256" stroke="#9922cc"  stroke-width="1.9" opacity="0.88"/>
  <line x1="405" y1="201" x2="405" y2="255" stroke="#8822bb"  stroke-width="1.8" opacity="0.82"/>
  <line x1="418" y1="203" x2="418" y2="253" stroke="#7722aa"  stroke-width="1.7" opacity="0.75"/>
  <line x1="434" y1="206" x2="434" y2="250" stroke="#6622aa"  stroke-width="1.6" opacity="0.68"/>
  <line x1="454" y1="211" x2="454" y2="245" stroke="#5533aa"  stroke-width="1.5" opacity="0.6"/>
  <line x1="478" y1="217" x2="478" y2="239" stroke="#4433bb"  stroke-width="1.3" opacity="0.5"/>
</g>

<!-- RIGHT wave outline -->
<path d="M440,228 C462,202 490,254 518,228 C536,212 554,244 572,228 C582,218 592,238 600,228"
  fill="none" stroke="url(#sigR)" stroke-width="2.2" stroke-linecap="round"/>
<path d="M440,228 C462,202 490,254 518,228 C536,212 554,244 572,228 C582,218 592,238 600,228"
  fill="none" stroke="#aa44ff" stroke-width="6" stroke-linecap="round" opacity="0.1" filter="url(#blur3)"/>

<!-- Black hole -->
<circle cx="340" cy="228" r="58" fill="#000000"/>
<circle cx="340" cy="228" r="58" fill="none" stroke="#ff8800" stroke-width="1.2" opacity="0.55"/>
<circle cx="340" cy="228" r="58" fill="none" stroke="#ffaa33" stroke-width="0.5" opacity="0.75"/>
<circle cx="340" cy="228" r="4"  fill="#0a0500"/>
<circle cx="340" cy="228" r="2"  fill="#150a00"/>

<!-- Divider -->
<line x1="200" y1="348" x2="480" y2="348" stroke="rgba(0,180,160,0.2)" stroke-width="0.8"/>

<!-- WORDMARK — teal glow layers -->
<text x="340" y="402" text-anchor="middle"
  font-family="Palatino Linotype, Palatino, Book Antiqua, Georgia, serif"
  font-size="54" font-weight="300" letter-spacing="16"
  fill="#00ffdd" opacity="0.18"
  filter="url(#tealGlowSoft)">AEVYRA</text>

<text x="340" y="402" text-anchor="middle"
  font-family="Palatino Linotype, Palatino, Book Antiqua, Georgia, serif"
  font-size="54" font-weight="300" letter-spacing="16"
  fill="#00eedd" opacity="0.55"
  filter="url(#tealGlow)">AEVYRA</text>

<text x="340" y="402" text-anchor="middle"
  font-family="Palatino Linotype, Palatino, Book Antiqua, Georgia, serif"
  font-size="54" font-weight="300" letter-spacing="16"
  fill="url(#tealG)">AEVYRA</text>

<!-- TAGLINE — teal glow bloom -->
<text x="340" y="450" text-anchor="middle"
  font-family="Palatino Linotype, Palatino, Book Antiqua, Georgia, serif"
  font-size="13" font-style="italic" letter-spacing="5"
  fill="#00ddcc" opacity="0.3"
  filter="url(#tagGlow)">intelligence from beyond</text>

<!-- TAGLINE — crisp layer -->
<text x="340" y="450" text-anchor="middle"
  font-family="Palatino Linotype, Palatino, Book Antiqua, Georgia, serif"
  font-size="13" font-style="italic" letter-spacing="5"
  fill="#00bbaa" opacity="0.75">intelligence from beyond</text>

</svg>
